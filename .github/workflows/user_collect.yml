name: CSQAQ User Collect

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: '用户ID（单用户模式）'
        required: false
        default: ''
      action:
        description: '采集类型 (trade/inventory)'
        required: true
        default: 'trade'
      token_index:
        description: 'Token索引（单用户模式）'
        required: false
        default: '0'
      user_list:
        description: '用户列表JSON（批量模式，如 [{"user_id":"123","token_index":0}]）'
        required: false
        default: ''

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run collect
        env:
          CSQAQ_TOKENS: ${{ secrets.CSQAQ_USER_TOKENS }}
          INPUT_USER_ID: ${{ github.event.inputs.user_id }}
          INPUT_ACTION: ${{ github.event.inputs.action }}
          INPUT_TOKEN_INDEX: ${{ github.event.inputs.token_index }}
          INPUT_USER_LIST: ${{ github.event.inputs.user_list }}
        run: |
          if [ -n "$INPUT_USER_LIST" ]; then
            python collect_user.py --action "$INPUT_ACTION" --user-list "$INPUT_USER_LIST"
          else
            python collect_user.py --user-id "$INPUT_USER_ID" --action "$INPUT_ACTION" --token-index "$INPUT_TOKEN_INDEX"
          fi

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: result.json
