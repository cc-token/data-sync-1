name: CSQAQ User Collect

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: '用户ID'
        required: true
        default: ''
      action:
        description: '采集类型 (trade/inventory)'
        required: true
        default: 'trade'
      token_index:
        description: 'Token索引'
        required: true
        default: '0'

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run collect
        env:
          CSQAQ_TOKENS: ${{ secrets.CSQAQ_USER_TOKENS }}
          INPUT_USER_ID: ${{ github.event.inputs.user_id }}
          INPUT_ACTION: ${{ github.event.inputs.action }}
          INPUT_TOKEN_INDEX: ${{ github.event.inputs.token_index }}
        run: python collect_user.py --user-id "$INPUT_USER_ID" --action "$INPUT_ACTION" --token-index "$INPUT_TOKEN_INDEX"

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: result.json
